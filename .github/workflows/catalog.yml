---
# Fail if the categories/ lists are stale (a catalog/ entry changed without
# regenerating). Same deterministic pattern as index.yml — no bot commits; the
# publishing agent runs `python3 scripts/build-catalog.py` and includes the
# updated categories/ files in its PR.
name: "Category lists up to date"

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  catalog:
    name: Check categories/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify the category lists are current
        run: python3 scripts/build-catalog.py --check
