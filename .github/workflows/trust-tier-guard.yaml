---
# Backstop for the local pre-push hook (scripts/git-hooks/pre-push): re-runs
# the same trust-tier guard on the public mirror so a skipped/uninstalled local
# hook can't leak identifiers or secrets. Logic shared via scan.sh.
#
# Runs on GitHub-hosted ubuntu-latest (no self-hosted dependency) — a pure text
# scan that still runs when the self-hosted runner is unavailable.
name: "Trust-Tier Guard"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Trust-Tier Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for range scan)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks (checksum-verified)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tmp="$(mktemp -d)"
          curl -sSfL "${base}/${tarball}" -o "${tmp}/${tarball}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o "${tmp}/checksums.txt"
          ( cd "${tmp}" && grep " ${tarball}\$" checksums.txt | sha256sum -c - )
          tar -xz -C /usr/local/bin -f "${tmp}/${tarball}" gitleaks
          gitleaks version

      - name: Run trust-tier guard over the pushed range
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          zero='0000000000000000000000000000000000000000'
          if [ -z "${BEFORE:-}" ] || [ "${BEFORE}" = "${zero}" ]; then
            echo "No usable 'before' SHA (new branch / first push) — scanning whole tree."
            bash scripts/trust-tier/scan.sh
          else
            echo "Scanning range ${BEFORE}..${AFTER}"
            bash scripts/trust-tier/scan.sh "${BEFORE}..${AFTER}"
          fi
